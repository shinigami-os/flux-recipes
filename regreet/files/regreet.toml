skip_selection = true

# no [background] section - regreet uses glycin to load background images,
# which needs glycin-loaders (a set of sandboxed decoder helper binaries)
# that Kira doesn't package; without it the background load hangs and the
# whole greeter renders as a blank screen. The CSS on `window` draws the
# backdrop instead.

[GTK]
application_prefer_dark_theme = true
cursor_theme_name = "Adwaita"
cursor_blink = true
font_name = "JetBrains Mono 11"
icon_theme_name = "Adwaita"
theme_name = "Adwaita"

[commands]
reboot = ["reboot"]
poweroff = ["poweroff"]

[appearance]
# the greeting is the one bit of "voice" - left empty on purpose
greeting_msg = ""

[widget.clock]
# the clock label is rendered with set_markup, so the two-tier time/date
# treatment is done here rather than in CSS (which can't size parts of a label)
format = "<span size='40pt' weight='300'>%H:%M</span>\n<span size='12pt' foreground='#6b4f9e'>%A · %d %b %Y</span>"
resolution = "500ms"
label_width = 200

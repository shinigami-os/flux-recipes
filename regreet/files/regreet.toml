skip_selection = false

# no [background] section - regreet uses glycin to load background images,
# which needs glycin-loaders (a set of sandboxed decoder helper binaries)
# that Kira doesn't package; without it the background load hangs and the
# whole greeter renders as a blank screen. The CSS gradient on
# window#background covers the visual instead.

[GTK]
application_prefer_dark_theme = true
cursor_theme_name = "Adwaita"
cursor_blink = true
font_name = "Raleway 11"
icon_theme_name = "Adwaita"
theme_name = "Adwaita"

[commands]
reboot = ["reboot"]
poweroff = ["poweroff"]

[appearance]
greeting_msg = "Welcome to Kira"

[widget.clock]
format = "%a %H:%M"
resolution = "500ms"
label_width = 150
